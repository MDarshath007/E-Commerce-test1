<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Order Placed | MeeKART</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="CSS/order-success.css"
  />
</head>

<body>


  <!-- Order Success Section -->

  <main
    class="container d-flex justify-content-center align-items-center success-page"
  >

    <div class="success-card">

      <div class="check-circle">
        ✓
      </div>

      <h1 class="mt-4">
        Order Placed Successfully!
      </h1>

      <p class="text-muted mt-3">
        Thank you for shopping with MeeKART.
        Your order has been received and is
        being processed.
      </p>

      <div class="order-details">

        <div class="detail-row">
          <span>Order ID</span>
          <span>#MK48392</span>
        </div>

        <div class="detail-row">
          <span>Estimated Delivery</span>
          <span>3 - 5 Days</span>
        </div>

      </div>

      <div class="mt-4">

        <a
          href="index.html"
          class="btn btn-primary px-4 me-2"
        >
          Continue Shopping
        </a>

        <a
          href="HTML files/cart.html"
          class="btn btn-outline-primary px-4"
        >
          View Cart
        </a>

      </div>

    </div>

  </main>

</body>
</html>
