<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MeeKart</title>

    <link rel="icon" href="Assets/Icons/shopping.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="cart.css" />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid nav-bar">
        <a class="navbar-brand text-white" href="index.html"
          ><img
            class="bag-icon"
            src="Assets/Icons/shopping.png"
            alt=""
          />MeeKART</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarTogglerDemo01"
          aria-controls="navbarTogglerDemo01"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a
                class="nav-link active text-white"
                aria-current="page"
                href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle text-white"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Categories
              </a>
              <ul class="dropdown-menu">
                <li><a data-category="laptops" class="dropdown-item category-btnfilter-page.html">Laptops</a></li>
                <li><a data-category="smartphones" class="dropdown-item category-btnfilter-page.html">Smartphones</a></li>
                <li><a data-category="furniture" class="dropdown-item category-btnfilter-page.html">Furniture</a></li>
                <li><a data-category="mens-shoes,womans-shoes" class="dropdown-item category-btnfilter-page.html">Footwear</a></li>
                <li><a data-category="mens-watches,womans-watches" class="dropdown-item category-btnfilter-page.html">Watches</a></li>
              </ul>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
              id="search-bar"
            />
            <button type="submit" id="search-btn">🔍︎</button>
          </form>
          <a href="cart.html"
            ><img class="cart-icon" src="Assets/Icons/cart.png" alt=""
          /></a>
        </div>
      </div>
    </nav>

    <!-- CART PAGE -->

    <div class="container-lg cart-page mt-1" id="cart-container">
      <h1 class="mb-3">Your Cart</h1>
    </div>
    <div class="container-md" id="order-summary">
      <h1 class="mb-3">Order Summary</h1>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
    <script src="app.js"></script>
    <script src="filter-page.js"></script>
  </body>
</html>
