  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" href="Assets/Icons/shopping.png" />
      <title>MeeKart</title>
      <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
      />
      <link rel="stylesheet" href="style.css" />
    </head>
    <body>
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid nav-bar">
          <a class="navbar-brand text-white" href="index.html"
            ><img
              class="bag-icon"
              src="Assets/Icons/shopping.png"
              alt=""
            />MeeKART</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarTogglerDemo01"
            aria-controls="navbarTogglerDemo01"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active text-white"
                  aria-current="page"
                  href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle text-white"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Categories
                </a>
                <ul class="dropdown-menu" id="category-links">
                  <li><a data-category="laptops" class="dropdown-item category-btn" href="filter-page.html">Laptops</a></li>
                  <li><a data-category="smartphones" class="dropdown-item category-btn" href="filter-page.html">Smartphones</a></li>
                  <li><a data-category="furniture" class="dropdown-item category-btn" href="filter-page.html">Furniture</a></li>
                  <li><a data-category="mens-shoes,womans-shoes" class="dropdown-item category-btn" href="filter-page.html">Footwear</a></li>
                  <li><a data-category="mens-watches,womans-watches" class="dropdown-item category-btn" href="filter-page.html">Watches</a></li>
                </ul>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
                id="search-bar"
              />
              <button type="submit" id="search-btn">🔍︎</button>
            </form>
            <a href="cart.html"
              ><img class="cart-icon" src="Icons/cart.png" alt=""
            /></a>
          </div>
        </div>
      </nav>
      <div class="container-md banner mb-1 px-5 rounded-3" id="banner">
        <div class="banner-content">
          <h2>Big Deals on</h2>
          <h1>Top Quality Products</h1>
          <p>Shop the latest products at the best price only on MeeKART</p>
          <a href="index.html">
            <button class="btn btn-primary shop-now" id="shop-now-btn">Shop Now</button>
          </a>
        </div>
      </div>
      <h1 class="text-center">Featured Products</h1>
      <div
        class="container-md cards pt-2 d-flex justify-content-start gap-4 flex-nowrap overflow-auto"
        id="featured-products"
      >
      </div>
    </body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="app.js"></script>
  </html>
